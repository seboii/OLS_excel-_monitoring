name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ols
          POSTGRES_PASSWORD: ols_test
          POSTGRES_DB: ols_control_center_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ols"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
        env:
          OLS_DB_CONNECTION: "Host=localhost;Port=5432;Database=ols_control_center_test;Username=ols;Password=ols_test"

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

  docker:
    name: Docker images (build only)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f src/Ols.ControlCenter.Api/Dockerfile -t ols-api:ci .
      - name: Build Web image
        run: docker build -f web/Dockerfile -t ols-web:ci ./web
